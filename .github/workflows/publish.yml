name: Auto-publish next blog post

on:
  schedule:
    - cron: "0 9 * * 2,5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish next queued post (if any)
        run: python scripts/publish_next.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "Not Your Guru Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-publish: new blog post [skip ci]"
          git push
